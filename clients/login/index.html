<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Client Portal — JstLikeHome</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--paper:#FBF8F3;--card:#FFFFFF;--ink:#211d18;--ink-soft:#5d564c;--line:#e7e0d5;--coral:#E63946;}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;min-height:100dvh;display:grid;place-items:center;background:
      radial-gradient(120% 80% at 50% -10%, rgba(230,57,70,.06), transparent 60%),var(--paper);
    color:var(--ink);font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    -webkit-font-smoothing:antialiased;padding:24px}
  .card{width:100%;max-width:400px;background:var(--card);border:1px solid var(--line);border-radius:20px;
    padding:38px 34px;box-shadow:0 1px 2px rgba(33,29,24,.04),0 22px 60px rgba(33,29,24,.12);text-align:center}
  .logo{height:62px;width:auto;margin:0 auto 22px;display:block}
  h1{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:25px;margin:0 0 7px;letter-spacing:-.01em}
  .sub{color:var(--ink-soft);font-size:14.5px;margin:0 0 24px;line-height:1.55}
  .sub .es{opacity:.78}
  form{display:grid;gap:11px;text-align:left}
  label{font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft)}
  input[type=password]{width:100%;font:inherit;font-size:16px;padding:13px 15px;border:1px solid var(--line);
    border-radius:12px;background:#fdfbf7;color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s}
  input[type=password]:focus{border-color:var(--coral);box-shadow:0 0 0 3px rgba(230,57,70,.13)}
  button{font:inherit;font-weight:700;font-size:15px;color:#fff;background:var(--coral);border:none;border-radius:12px;
    padding:14px;cursor:pointer;transition:filter .15s,transform .15s;margin-top:5px}
  button:hover{filter:brightness(1.06)}
  button:active{transform:translateY(1px)}
  .err{display:none;background:#fdecec;border:1px solid #f3c4c4;color:#a02530;font-size:13px;font-weight:600;
    border-radius:10px;padding:10px 12px;margin-bottom:6px;text-align:left}
  .err.show{display:block}
  .foot{margin-top:22px;font-size:11.5px;color:var(--ink-soft);letter-spacing:.04em;text-transform:uppercase;font-weight:600}
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/assets/img/logo-portal.png" alt="JstLikeHome">
    <h1>Client portal</h1>
    <p class="sub">Enter your password to continue.<br><span class="es">Ingrese su contraseña para continuar.</span></p>
    <div class="err" id="err">Incorrect password, please try again. · Contraseña incorrecta.</div>
    <form method="POST" action="/clients/login">
      <label for="password">Password · Contraseña</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
      <input type="hidden" name="next" id="next" value="">
      <button type="submit">Enter · Entrar</button>
    </form>
    <p class="foot">Private &amp; confidential</p>
  </div>
  <script>
    (function () {
      var q = new URLSearchParams(location.search);
      var next = q.get('next') || '';
      if (next && !/^\/clients\//.test(next)) next = ''; // empty -> password decides the destination
      document.getElementById('next').value = next;
      if (q.get('error')) document.getElementById('err').classList.add('show');
      var p = document.getElementById('password');
      if (p) p.focus();
    })();
  </script>
</body>
</html>
