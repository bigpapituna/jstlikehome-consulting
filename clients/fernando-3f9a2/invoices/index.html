<!-- Fernando portal — invoices (outstanding vs paid). Data via /api/invoices,
     published by the operator; drafts are never shown here. -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>JSTLIKEHOME · Invoices</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#FBF8F3;--surface:#FFFFFF;--surface-2:#F3EEE6;--ink:#211d18;--muted:#5d564c;--border:#e7e0d5;
    --accent:#F0625E;--accent-ink:#d14b47;--done:#1f8a5b;
    --fh:'Fraunces',Georgia,serif;--fb:'Plus Jakarta Sans',system-ui,sans-serif}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--fb);line-height:1.55}
  .wrap{max-width:760px;margin:0 auto;padding:26px 18px 72px}
  .brand{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:700}
  h1{font-family:var(--fh);font-weight:600;font-size:clamp(26px,6.5vw,36px);margin:8px 0 6px;line-height:1.08}
  .sub{color:var(--muted);font-size:14px;margin:0 0 18px}
  .langtoggle{float:right;border:1px solid var(--border);background:var(--surface);color:var(--ink);
    font-size:12px;font-weight:600;padding:8px 12px;border-radius:999px;cursor:pointer}
  .inv{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:6px 18px}
  .row{display:grid;grid-template-columns:1fr auto auto;gap:6px 14px;align-items:center;padding:13px 0;border-top:1px solid var(--surface-2)}
  .row:first-child{border-top:0}
  .n{font-weight:700;font-size:14.5px}
  .n small{display:block;font-weight:500;font-size:11.5px;color:var(--muted)}
  .amt{font-variant-numeric:tabular-nums;font-weight:700;white-space:nowrap}
  .chip{font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 10px;border-radius:999px;white-space:nowrap}
  .chip.paid{color:var(--done);background:color-mix(in srgb,var(--done) 14%,transparent)}
  .chip.outstanding{color:var(--accent-ink);background:color-mix(in srgb,var(--accent) 14%,transparent)}
  .empty{color:var(--muted);font-size:14px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px}
  .note{color:var(--muted);font-size:12.5px;margin-top:18px}
  .err{background:#fdecec;border:1px solid #f3b8b6;color:#9c3532;border-radius:12px;padding:12px 14px;font-size:13.5px;margin:14px 0;display:none}
</style>
<nav class="pnav"><div class="pnav-in">
  <a class="pn-brand" href="/clients/fernando-3f9a2/">JST<b>LIKE</b>HOME</a>
  <div class="pnav-links">
    <a href="/clients/fernando-3f9a2/" data-pn="home">Home</a>
    <a href="/clients/fernando-3f9a2/status/" data-pn="status">Status</a>
    <a href="/clients/fernando-3f9a2/deliverables/" data-pn="tasks">Tasks</a>
    <a href="/clients/fernando-3f9a2/invoices/" data-pn="invoices">Invoices</a>
    <a href="/clients/fernando-3f9a2/proposal/" data-pn="proposal">Proposal</a>
    <a href="/clients/fernando-3f9a2/contract/" data-pn="contract">Contract</a>
  </div>
</div></nav>
<style>
.pnav{position:sticky;top:0;z-index:50;background:rgba(251,248,243,.9);-webkit-backdrop-filter:saturate(1.3) blur(8px);backdrop-filter:saturate(1.3) blur(8px);border-bottom:1px solid #e7e0d5;font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif}
.pnav-in{max-width:880px;margin:0 auto;padding:11px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.pnav .pn-brand{font-weight:800;font-size:14px;letter-spacing:.02em;color:#211d18;text-decoration:none;margin-right:auto}
.pnav .pn-brand b{color:#F0625E}
.pnav-links{display:flex;gap:4px;flex-wrap:wrap}
.pnav-links a{font-size:13px;font-weight:600;color:#6c6258;text-decoration:none;padding:6px 12px;border-radius:999px;transition:background .15s,color .15s}
.pnav-links a:hover{color:#211d18;background:#F3EEE6}
.pnav-links a.active{color:#fff;background:#F0625E}
</style>
<script>(function(){var p=location.pathname.replace(/index\.html$/,'').replace(/\/$/,'');document.querySelectorAll('.pnav-links a[data-pn]').forEach(function(a){var h=a.getAttribute('href').replace(/\/$/,'');if(h===p||(a.getAttribute('data-pn')==='home'&&/fernando-3f9a2$/.test(p)))a.classList.add('active');});})();</script>


<div class="wrap">
  <button class="langtoggle" id="langbtn" type="button"></button>
  <div class="brand">JSTLIKEHOME</div>
  <h1 id="t-title"></h1>
  <p class="sub" id="t-sub"></p>
  <div class="err" id="err"></div>
  <div class="inv" id="list"></div>
  <p class="note" id="t-note"></p>
</div>
<script>
const L10N = {
  en: { title:"Invoices", sub:"Your management invoices \u2014 status updates automatically.", toggle:"ES",
    paid:"Paid", outstanding:"Outstanding", issued:"Issued", paidOn:"paid",
    empty:"No invoices yet.", note:"Questions about an invoice? Reach Roy at roy.y@jstlikehome.com.",
    errLoad:"Couldn't load invoices \u2014 refresh to try again." },
  es: { title:"Facturas", sub:"Tus facturas de gesti\u00f3n \u2014 el estado se actualiza autom\u00e1ticamente.", toggle:"EN",
    paid:"Pagada", outstanding:"Pendiente", issued:"Emitida", paidOn:"pagada",
    empty:"A\u00fan no hay facturas.", note:"\u00bfPreguntas sobre una factura? Escribe a Roy: roy.y@jstlikehome.com.",
    errLoad:"No se pudieron cargar las facturas \u2014 recarga para reintentar." }
};
let lang = localStorage.getItem("jlh.lang") || "en";
let INV = [];
const $ = id => document.getElementById(id);
const esc = s => String(s==null?"":s).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
function money(x,c){ return (c==="USD"?"$":"") + Number(x||0).toLocaleString("en-US",{minimumFractionDigits:2}) + (c==="USD"?"":" "+esc(c||"")); }
function render(){
  const L = L10N[lang];
  document.documentElement.lang = lang;
  $("langbtn").textContent = L.toggle;
  $("t-title").textContent = L.title; $("t-sub").textContent = L.sub; $("t-note").textContent = L.note;
  $("list").innerHTML = INV.length ? INV.map(v => `<div class="row">
      <div class="n">${esc(v.number)}<small>${L.issued} ${esc(v.issued||"")}${v.status==="paid"&&v.paid_at?` \u00b7 ${L.paidOn} ${esc(v.paid_at)}`:""}</small></div>
      <div class="amt">${money(v.total, v.currency)}</div>
      <span class="chip ${esc(v.status)}">${v.status==="paid"?L.paid:L.outstanding}</span>
    </div>`).join("") : `<div class="empty">${L10N[lang].empty}</div>`;
}
$("langbtn").addEventListener("click", () => { lang = lang==="es"?"en":"es"; localStorage.setItem("jlh.lang", lang); render(); });
render();
fetch("/api/invoices").then(r=>r.json()).then(d=>{
  if(d && d.ok){ INV = d.invoices||[]; render(); }
  else { const e=$("err"); e.textContent=(d&&d.error)||L10N[lang].errLoad; e.style.display="block"; }
}).catch(()=>{ const e=$("err"); e.textContent=L10N[lang].errLoad; e.style.display="block"; });
</script>
