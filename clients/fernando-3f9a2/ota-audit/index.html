  {
    channel: "Airbnb",
    tabnote: "4 accts",
    sub: {en:"We audited all 4 host accounts, 20 active listings in total: Caribbean Dream Luxury Stays (13), Caribbean Dream Vacations (3), Caribbean Dream Properties (3), Caribbean Dream Vacation Rentals (1). Every Hostaway unit is present and Connected.",
          es:"Auditamos las 4 cuentas de anfitrión, 20 anuncios activos en total: Caribbean Dream Luxury Stays (13), Caribbean Dream Vacations (3), Caribbean Dream Properties (3), Caribbean Dream Vacation Rentals (1). Cada unidad de Hostaway está presente y Conectada."},
    summary: {
      en: [
        "<b>Full coverage confirmed.</b> Across the 4 host accounts, all 20 Hostaway units are live on Airbnb, each shows “Connected”, and each title matches the central system. The title drift found on Vrbo does not appear here. Villa Blanca makes the comparison plain: perfect bed data on Airbnb, garbled on Vrbo.",
        "<b>The #1 issue: “not suitable for children/infants” is set on 17 of 20 listings</b> while the same pages advertise cribs, babysitters, bunk rooms and playgrounds. Two of the portfolio's four 5.0 reviews come from families who stayed with kids. Families are the core market for these villas, and this checkbox removes you from their searches.",
        "<b>Smoke/CO alarms read “not reported” on 14 of 20 listings.</b> Airbnb shows that warning to every guest who opens the Safety section. It costs family bookings.",
        "<b>16 of 20 listings carry the “automatically translated” banner</b> (every account except Caribbean Dream Vacations). The content source language is misconfigured, so guests read machine translation with a disclaimer.",
        "<b>Amenity depth runs from 7 tags (Hacienda A40) to 62 (Cayuco 38)</b>, the same Hostaway source gap found on Vrbo. Cayuco 38 and Portal Del Mar 201 (48) set the standard; one completion pass in Hostaway repairs both channels.",
        "<b>Review equity sits near zero: 4 reviews across all 20 listings</b> (all 5.0), against 70 on the Vrbo twins of Victorian U1, the Penthouse and Casamare. The accounts are 4 to 8 months old. Request a review at every checkout to close this.",
        "<b>Caribbean Dream Vacations shows a 43% response rate</b> (“responds within a few days or more”) on each of its listings. The metric suppresses ranking across the account and blocks Superhost. The Hostaway unified inbox with response automation fixes the root cause.",
        "<b>7 parked or unknown properties surfaced:</b> Fundadores de Golf 28, Villa NoCo, OO 1114, Aquamarina Luxe Retreat, plus three unlisted Sosúa units (a 2BR, Las Palmas 4BR, and a “Spacious 2BR aparment”, typo included). None exist in Hostaway or on Vrbo. Each needs a decision: onboard or archive. One trap to defuse: OO 1114's headline (“Spacious 3BR Oceanfront, Pool, Private Terrace”) is nearly identical to Juanillo 25's live headline with a different bedroom count — rename one so spreadsheets and sync work never confuse them."
      ],
      es: [
        "<b>Cobertura completa confirmada.</b> Entre las 4 cuentas de anfitrión, las 20 unidades de Hostaway están activas en Airbnb, cada una muestra “Conectado” y cada título coincide con el sistema central. La desviación de títulos encontrada en Vrbo no aparece aquí. Villa Blanca deja clara la comparación: camas perfectas en Airbnb, confusas en Vrbo.",
        "<b>El problema #1: “no apto para niños/bebés” está activado en 17 de 20 anuncios</b> mientras las mismas páginas anuncian cunas, niñeras, literas y parques de juegos. Dos de las cuatro reseñas 5.0 del portafolio vienen de familias que se quedaron con niños. Las familias son el mercado principal de estas villas, y esta casilla los saca de sus búsquedas.",
        "<b>Las alarmas de humo/CO aparecen “no reportadas” en 14 de 20 anuncios.</b> Airbnb muestra esa advertencia a cada huésped que abre la sección de Seguridad. Cuesta reservas familiares.",
        "<b>16 de 20 anuncios llevan el aviso de “traducción automática”</b> (todas las cuentas excepto Caribbean Dream Vacations). El idioma fuente está mal configurado, así que los huéspedes leen traducción de máquina con descargo.",
        "<b>La profundidad de servicios va de 7 etiquetas (Hacienda A40) a 62 (Cayuco 38)</b>, la misma brecha de origen en Hostaway encontrada en Vrbo. Cayuco 38 y Portal Del Mar 201 (48) marcan el estándar; una pasada de completado en Hostaway repara ambos canales.",
        "<b>El capital de reseñas está cerca de cero: 4 reseñas entre los 20 anuncios</b> (todas 5.0), frente a 70 en los gemelos de Vrbo de Victorian U1, el Penthouse y Casamare. Las cuentas tienen de 4 a 8 meses. Pedir una reseña en cada salida cierra esta brecha.",
        "<b>Caribbean Dream Vacations muestra 43% de tasa de respuesta</b> (“responde en varios días o más”) en cada uno de sus anuncios. La métrica hunde el posicionamiento de toda la cuenta y bloquea el Superhost. La bandeja unificada de Hostaway con automatización corrige la causa raíz.",
        "<b>Aparecieron 7 propiedades estacionadas o desconocidas:</b> Fundadores de Golf 28, Villa NoCo, OO 1114, Aquamarina Luxe Retreat, más tres unidades de Sosúa despublicadas (un 2BR, Las Palmas 4BR y un “Spacious 2BR aparment”, error incluido). Ninguna existe en Hostaway ni en Vrbo. Cada una necesita decisión: incorporar o archivar. Una trampa por desactivar: el titular de OO 1114 (“Spacious 3BR Oceanfront, Pool, Private Terrace”) es casi idéntico al titular vivo de Juanillo 25 con distinto número de habitaciones — renombrar uno para que hojas de cálculo y sincronización nunca los confundan."
      ],
      money: {
        en: [
          "<b>Instant Book is ON across every account we probed — protect it.</b> It's the single strongest ranking and conversion setting on Airbnb, and it's already right.",
          "<b>Every sampled listing uses the Firm cancellation policy:</b> 24-hour grace, then partial refund only 30+ days out. On zero-review listings, guests have no reviews to trust AND strict terms; loosening to Moderate until reviews build converts more lookers.",
          "<b>No launch promotions are running.</b> The accounts are past Airbnb's new-listing window, but weekly/monthly discounts and custom promotions remain unused levers on 20 listings with near-zero forward occupancy.",
          "<b>The children flag (17 of 20) is a market-access issue, not just a settings error:</b> these villas sleep 10–20 — the family and multi-family group segment IS the buyer. One checkbox per listing reopens that market."
        ],
        es: [
          "<b>Instant Book está activo en cada cuenta que probamos — protegerlo.</b> Es el ajuste de posicionamiento y conversión más fuerte de Airbnb, y ya está bien puesto.",
          "<b>Cada anuncio muestreado usa la política de cancelación Firme:</b> 24 horas de gracia, luego reembolso parcial solo con 30+ días. En anuncios sin reseñas, el huésped no tiene reseñas en las que confiar Y términos estrictos; aflojar a Moderada hasta construir reseñas convierte más visitantes.",
          "<b>No hay promociones de lanzamiento activas.</b> Las cuentas ya pasaron la ventana de anuncio nuevo de Airbnb, pero los descuentos semanales/mensuales y las promociones personalizadas siguen sin usarse en 20 anuncios con ocupación futura casi nula.",
          "<b>La casilla de niños (17 de 20) es un problema de acceso al mercado, no solo de configuración:</b> estas villas duermen 10–20 — el segmento familiar y de grupos multifamiliares ES el comprador. Una casilla por anuncio reabre ese mercado."

        "<b>Casa Estefania needs its own line:</b> the richest amenity data of the portfolio, but a “200 sq ft” size error on a 10-bedroom estate, only 15 photos, and Expedia fills its page with a competitor carousel. Its 72% score is the photo gap talking.",

        "<b>La brecha #1 de contenido: cada anuncio muestra la descripción auto-generada de Expedia</b> (“ofrece servicios como un jardín”) en lugar del texto de venta real. Los huéspedes ven texto de plantilla en las 20 páginas.",

let lang = "es";
let activeTab = 0;
function statusClass(s){return s==="crit"?"crit":s==="needs"?"needs":"good";}
function pillClass(s){return s==="crit"?"crit":s==="needs"?"fix":"ok";}

function render(){
  const T = L10N[lang];
  document.documentElement.lang = lang;
  document.getElementById("t-title").textContent = T.title;
  document.getElementById("t-client").innerHTML = T.client(DATA.client);
  document.getElementById("t-updated").textContent = T.updated(DATA.updated);
  document.getElementById("langbtn").textContent = T.toggle;
  document.getElementById("foot").innerHTML = T.foot;

  document.getElementById("tabs").innerHTML = DATA.sections.map((s,i)=>
    `<button class="tab${i===activeTab?" active":""}" role="tab" aria-selected="${i===activeTab}" data-i="${i}" type="button">${s.channel}${s.tabnote?`<span class="cnt">${s.tabnote}</span>`:""}</button>`
  ).join("");
  document.querySelectorAll(".tab").forEach(b=>b.addEventListener("click",()=>{activeTab=+b.dataset.i;render();}));

  const sec = DATA.sections[activeTab];
  const ls = sec.listings;
  const crit = ls.filter(x=>x.status==="crit").length;
  const good = ls.filter(x=>x.status==="good").length;
  const norev = ls.filter(x=>(x.facts.reviews||0)===0).length;

  const stats = `
    <div class="stats">
      <div class="stat"><div class="k">${ls.length}</div><div class="l">${T.stats.audited}</div></div>
      <div class="stat crit"><div class="k">${crit}</div><div class="l">${T.stats.crit}</div></div>
      <div class="stat"><div class="k">${good}</div><div class="l">${T.stats.clean}</div></div>
      <div class="stat crit"><div class="k">${norev}<small>/${ls.length}</small></div><div class="l">${T.stats.noreviews}</div></div>
    </div>`;
  const moneyPanel = sec.summary.money ? `<div class="panel"><h3>${T.money}</h3><ul>${sec.summary.money[lang].map(x=>`<li>${x}</li>`).join("")}</ul></div>` : "";
  const sum = `<div class="panel"><h3>${T.sum}</h3><ul>${sec.summary[lang].map(x=>`<li>${x}</li>`).join("")}</ul></div>
    ${moneyPanel}
    <div class="panel"><h3>${T.pri}</h3><ul>${sec.summary.priorities[lang].map((x,i)=>`<li><b>${i+1}.</b> ${x}</li>`).join("")}</ul></div>`;
  const cards = ls.map(x=>{
    const facts = [];
    if(x.facts.photos) facts.push(`<span>${T.facts.photos} <b>${x.facts.photos}</b></span>`);
    facts.push(`<span>${T.facts.rating} <b>${x.facts.rating||"—"}</b></span>`);
    facts.push(`<span>${T.facts.reviews} <b>${x.facts.reviews}</b></span>`);
    return `
    <div class="card ${statusClass(x.status)}">
      <div class="card-h">
        <div><div class="n">${x.name}</div><div class="meta">${x.id}</div></div>
        <span class="pill ${pillClass(x.status)}">${T.status[x.status]}</span>
      </div>
      <div class="facts">${facts.join("")}</div>
      <div class="checks">${Object.entries(x.checks).map(([k,v])=>`<span class="chk ${v}">${T.checks[k]}</span>`).join("")}</div>
      <div class="lbl">${T.findings}</div><ul class="fnd">${x.f[lang].map(i=>`<li>${i}</li>`).join("")}</ul>
      <div class="lbl">${T.recs}</div><ul class="rec">${x.r[lang].map(i=>`<li>${i}</li>`).join("")}</ul>
    </div>`;}).join("");

  document.getElementById("report").innerHTML = `<p class="sub">${sec.sub[lang]}</p>${stats}${sum}${cards}`;
}
document.getElementById("langbtn").addEventListener("click",()=>{lang=lang==="es"?"en":"es";render();});
render();
</script>
