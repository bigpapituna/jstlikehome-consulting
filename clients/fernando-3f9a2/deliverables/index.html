<!-- Fernando portal — shared deliverables list (Alondra's tasks). Data lives in
     data.json in this folder; reads/writes go through /api/deliverables. -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>JSTLIKEHOME · Deliverables</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FBF8F3; --surface:#FFFFFF; --surface-2:#F3EEE6;
    --ink:#211d18; --muted:#5d564c; --border:#e7e0d5;
    --accent:#F0625E; --accent-ink:#d14b47; --done:#1f8a5b;
    --fh:'Fraunces',Georgia,serif; --fb:'Plus Jakarta Sans',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--fb);line-height:1.55}
  .wrap{max-width:820px;margin:0 auto;padding:26px 18px 72px}
  .brand{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:700}
  h1{font-family:var(--fh);font-weight:600;font-size:clamp(26px,6.5vw,36px);margin:8px 0 6px;line-height:1.08}
  .sub{color:var(--muted);font-size:14px;margin:0 0 4px}
  .who{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:16px 0 22px;font-size:13px;color:var(--muted)}
  .who select{font:inherit;font-size:13px;padding:6px 10px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--ink)}
  .langtoggle{float:right;border:1px solid var(--border);background:var(--surface);color:var(--ink);
    font-size:12px;font-weight:600;padding:8px 12px;border-radius:999px;cursor:pointer}
  h2{font-family:var(--fh);font-weight:600;font-size:19px;margin:26px 0 10px}
  .task{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
  .task.done{opacity:.62}
  .tick{flex:0 0 auto;width:26px;height:26px;border-radius:50%;border:2px solid var(--border);background:var(--surface);cursor:pointer;font-size:14px;line-height:1;color:#fff}
  .task.done .tick{background:var(--done);border-color:var(--done)}
  .tbody{flex:1;min-width:0}
  .tt{font-weight:700;font-size:15px}
  .task.done .tt{text-decoration:line-through}
  .td{color:var(--muted);font-size:13px;margin-top:2px}
  .tmeta{display:flex;gap:14px;flex-wrap:wrap;margin-top:8px;font-size:12px;color:var(--muted);align-items:center}
  .tmeta b{color:var(--ink)}
  .tmeta input[type=date]{font:inherit;font-size:12px;padding:3px 7px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--ink)}
  .etabtn,.reopen{font:inherit;font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--ink);cursor:pointer}
  .etabtn:hover,.reopen:hover{border-color:var(--accent)}
  .late{color:var(--accent-ink);font-weight:700}
  .addcard{background:var(--surface);border:1.5px dashed var(--border);border-radius:14px;padding:16px;margin-top:6px}
  .addcard input[type=text],.addcard textarea{width:100%;font:inherit;font-size:14px;padding:9px 11px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--ink);margin-bottom:8px}
  .addcard textarea{min-height:56px;resize:vertical}
  .addrow{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .addrow label{font-size:12px;color:var(--muted)}
  .addrow input[type=date]{font:inherit;font-size:13px;padding:6px 9px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--ink)}
  .addbtn{font:inherit;font-size:13.5px;font-weight:700;padding:9px 18px;border-radius:999px;border:0;background:var(--accent);color:#fff;cursor:pointer;margin-left:auto}
  .addbtn:disabled{opacity:.6}
  .note{color:var(--muted);font-size:12.5px;margin-top:20px}
  .empty{color:var(--muted);font-size:14px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px}
  .err{background:#fdecec;border:1px solid #f3b8b6;color:#9c3532;border-radius:12px;padding:12px 14px;font-size:13.5px;margin:14px 0;display:none}
</style>

<nav class="pnav"><div class="pnav-in">

    <a href="/clients/fernando-3f9a2/deliverables/" data-pn="tasks">Tasks</a>

  </div>
</div></nav>
<style>
.pnav{position:sticky;top:0;z-index:50;background:rgba(251,248,243,.9);-webkit-backdrop-filter:saturate(1.3) blur(8px);backdrop-filter:saturate(1.3) blur(8px);border-bottom:1px solid #e7e0d5;font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif}
.pnav-in{max-width:880px;margin:0 auto;padding:11px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}

<div class="wrap">
  <button class="langtoggle" id="langbtn" type="button"></button>
  <div class="brand">JSTLIKEHOME</div>
  <h1 id="t-title"></h1>
  <p class="sub" id="t-sub"></p>
  <div class="who"><span id="t-who"></span>
    <select id="whoSel"><option>Alondra</option><option>Fernando</option><option>Roy</option></select>
  </div>

  <div class="err" id="err"></div>

  <h2 id="t-open"></h2>
  <div id="openList"></div>

  <div class="addcard">
    <h2 id="t-add" style="margin-top:0"></h2>
    <input type="text" id="addTitle" maxlength="140">
    <textarea id="addDesc" maxlength="500"></textarea>
    <div class="addrow">
      <label id="t-due"></label><input type="date" id="addDue">
      <button class="addbtn" id="addBtn"></button>
    </div>
  </div>

  <h2 id="t-done"></h2>
  <div id="doneList"></div>

  <p class="note" id="t-note"></p>
</div>

<script>
const L10N = {
  en: { title:"Deliverables", sub:"Shared task list — everyone sees the same board, live.",
    who:"I am:", open:"To do", add:"Add a task", addBtn:"Add task",
    titlePh:"What needs to be done?", descPh:"Any details (optional)",
    due:"Target date", done:"Completed", toggle:"ES",
    eta:"Estimated completion", etaSave:"Save date", markDone:"Mark as done ✓", reopen:"Reopen",
    by:"by", added:"added", target:"Target", completed:"Done", late:"past target",
    emptyOpen:"Nothing pending — all caught up. 🎉", emptyDone:"Nothing completed yet.",
    note:"Tap the circle to mark a task complete. Set “estimated completion” so everyone knows when to expect it. Changes save instantly for everyone.",
    errLoad:"Couldn't load the list — check your connection and refresh." },
  es: { title:"Entregables", sub:"Lista de tareas compartida — todos ven el mismo tablero, en vivo.",
    who:"Yo soy:", open:"Pendientes", add:"Agregar una tarea", addBtn:"Agregar",
    titlePh:"¿Qué hay que hacer?", descPh:"Detalles (opcional)",
    due:"Fecha objetivo", done:"Completadas", toggle:"EN",
    eta:"Fecha estimada", etaSave:"Guardar fecha", markDone:"Marcar como hecha ✓", reopen:"Reabrir",
    by:"por", added:"agregada", target:"Objetivo", completed:"Hecha", late:"fuera de plazo",
    emptyOpen:"Nada pendiente — todo al día. 🎉", emptyDone:"Aún no hay tareas completadas.",
    note:"Toca el círculo para marcar una tarea como hecha. Pon la “fecha estimada” para que todos sepan cuándo esperarla. Los cambios se guardan al instante para todos.",
    errLoad:"No se pudo cargar la lista — revisa tu conexión y recarga." }
};
let lang = localStorage.getItem("jlh.lang") || "es";
let TASKS = [];
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s==null?"":s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const who = () => $("whoSel").value;
$("whoSel").value = localStorage.getItem("jlh.who") || "Alondra";
$("whoSel").addEventListener("change", () => localStorage.setItem("jlh.who", who()));

function api(method, body) {
  return fetch("/api/deliverables", {
    method, headers: {"Content-Type":"application/json"},
    body: body ? JSON.stringify(body) : undefined
  }).then(r => r.json());
}
function fail(msg){ const e=$("err"); e.textContent=msg; e.style.display="block"; }
function okpanel(){ $("err").style.display="none"; }

function taskRow(t, L) {
  const today = new Date().toISOString().slice(0,10);
  const open = t.status !== "done";
  const late = open && t.due && t.due < today;
  const meta = [];
  if (t.due) meta.push(`<span>${L.target}: <b>${esc(t.due)}</b>${late?` <span class="late">· ${L.late}</span>`:""}</span>`);
  if (open) meta.push(`<span>${L.eta}: <input type="date" value="${esc(t.eta||"")}" data-eta="${esc(t.id)}">
     <button class="etabtn" data-etasave="${esc(t.id)}">${L.etaSave}</button></span>`);
  else meta.push(`<span>${L.completed}: <b>${esc((t.completed_at||"").slice(0,10))}</b> ${L.by} <b>${esc(t.completed_by||"?")}</b></span>`);
  meta.push(`<span>${L.added} ${L.by} ${esc(t.created_by||"?")}</span>`);
  return `<div class="task ${open?"":"done"}">
    <button class="tick" data-tick="${esc(t.id)}" title="${open?L.markDone:L.reopen}">${open?"":"✓"}</button>
    <div class="tbody"><div class="tt">${esc(t.title)}</div>
      ${t.desc?`<div class="td">${esc(t.desc)}</div>`:""}
      <div class="tmeta">${meta.join("")}</div>
      ${open?"":`<div class="tmeta"><button class="reopen" data-reopen="${esc(t.id)}">${L.reopen}</button></div>`}
    </div></div>`;
}

function render() {
  const L = L10N[lang];
  document.documentElement.lang = lang;
  $("langbtn").textContent = L.toggle;
  $("t-title").textContent = L.title; $("t-sub").textContent = L.sub;
  $("t-who").textContent = L.who; $("t-open").textContent = L.open;
  $("t-add").textContent = L.add; $("addBtn").textContent = L.addBtn;
  $("addTitle").placeholder = L.titlePh; $("addDesc").placeholder = L.descPh;
  $("t-due").textContent = L.due + ":"; $("t-done").textContent = L.done;
  $("t-note").textContent = L.note;
  const open = TASKS.filter(t => t.status !== "done");
  const done = TASKS.filter(t => t.status === "done");
  $("openList").innerHTML = open.length ? open.map(t => taskRow(t, L)).join("") : `<div class="empty">${L.emptyOpen}</div>`;
  $("doneList").innerHTML = done.length ? done.map(t => taskRow(t, L)).join("") : `<div class="empty">${L.emptyDone}</div>`;
}

document.addEventListener("click", (e) => {
  const t = e.target;
  const tick = t.getAttribute && t.getAttribute("data-tick");
  const reopen = t.getAttribute && t.getAttribute("data-reopen");
  const etasave = t.getAttribute && t.getAttribute("data-etasave");
  if (tick) {
    const task = TASKS.find(x => x.id === tick);
    const action = task && task.status === "done" ? "reopen" : "complete";
    api("POST", {action, id: tick, by: who()}).then(d => { if (d.ok) { TASKS = d.tasks; render(); } else fail(d.error); });
  } else if (reopen) {
    api("POST", {action:"reopen", id: reopen, by: who()}).then(d => { if (d.ok) { TASKS = d.tasks; render(); } else fail(d.error); });
  } else if (etasave) {
    const inp = document.querySelector(`input[data-eta="${etasave}"]`);
    api("POST", {action:"eta", id: etasave, eta: (inp && inp.value) || "", by: who()}).then(d => { if (d.ok) { TASKS = d.tasks; render(); } else fail(d.error); });
  }
});
$("addBtn").addEventListener("click", () => {
  const title = $("addTitle").value.trim();
  if (!title) { $("addTitle").focus(); return; }
  $("addBtn").disabled = true;
  api("POST", {action:"add", title, desc: $("addDesc").value.trim(), due: $("addDue").value || "", by: who()})
    .then(d => { if (d.ok) { TASKS = d.tasks; $("addTitle").value=""; $("addDesc").value=""; $("addDue").value=""; render(); } else fail(d.error); })
    .catch(() => fail(L10N[lang].errLoad))
    .then(() => { $("addBtn").disabled = false; });
});
$("langbtn").addEventListener("click", () => { lang = lang === "es" ? "en" : "es"; localStorage.setItem("jlh.lang", lang); render(); });

render();
api("GET").then(d => { if (d.ok) { TASKS = d.tasks; okpanel(); render(); } else fail(d.error || L10N[lang].errLoad); })
  .catch(() => fail(L10N[lang].errLoad));
setInterval(() => { api("GET").then(d => { if (d.ok) { TASKS = d.tasks; render(); } }).catch(()=>{}); }, 60000);
</script>
