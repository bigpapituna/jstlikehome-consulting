<style>
  /* Palette matches Fernando's portal (Fraunces + Plus Jakarta Sans, cream + coral). */
  :root{
    --bg:#FBF8F3; --surface:#FFFFFF; --surface-2:#F3EEE6;
    --ink:#211d18; --muted:#5d564c; --border:#e7e0d5;
    --accent:#F0625E; --accent-ink:#d14b47;
    --done:#1f8a5b; --active:#F0625E; --sched:#C98A2E; --pend:#b3a89a;
    --ring:rgba(240,98,94,.35);
    --fh:'Fraunces',Georgia,ui-serif,serif;
    --fb:'Plus Jakarta Sans',system-ui,-apple-system,'Segoe UI',sans-serif;
    --fm:'Plus Jakarta Sans',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--fb);line-height:1.55;-webkit-text-size-adjust:100%}
  .wrap{max-width:820px;margin:0 auto;padding:26px 18px 72px}
  a{color:var(--accent-ink)}

  .top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
  .brand{font-family:var(--fm);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent)}
  h1{font-family:var(--fh);font-weight:600;font-size:clamp(26px,6.5vw,36px);line-height:1.08;margin:8px 0 6px;letter-spacing:-.01em;text-wrap:balance}
  .clientline{color:var(--muted);font-size:14.5px;margin:0}
  .clientline b{color:var(--ink);font-weight:600}
  .updated{font-family:var(--fm);font-size:11.5px;color:var(--muted);margin-top:6px}

  .langtoggle{border:1px solid var(--border);background:var(--surface);color:var(--ink);
    font-family:var(--fm);font-size:12px;font-weight:600;letter-spacing:.06em;padding:8px 12px;border-radius:999px;cursor:pointer}
  .langtoggle:hover{border-color:var(--accent)}
  .langtoggle:focus-visible{outline:2px solid var(--ring);outline-offset:2px}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:24px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 16px 14px}
  .stat .k{font-family:var(--fh);font-size:34px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--accent);line-height:1;letter-spacing:-.01em}
  .stat .k small{font-size:16px;color:var(--muted)}
  .stat .l{font-size:12.5px;color:var(--muted);margin-top:6px}
  .bar{height:5px;border-radius:999px;background:var(--surface-2);margin-top:10px;overflow:hidden}
  .bar > i{display:block;height:100%;background:var(--accent);border-radius:999px}

  h2{font-family:var(--fh);font-weight:600;font-size:20px;margin:34px 0 3px}
  .sub{color:var(--muted);font-size:13.5px;margin:0 0 16px}

  /* ── channels: one calm card, a bar per channel — nothing to click ── */
  .chan{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:6px 18px;margin:0 0 8px}
  .chan-row{display:grid;grid-template-columns:minmax(120px,1.1fr) 2fr auto;gap:8px 14px;align-items:center;padding:13px 0;border-top:1px solid var(--surface-2)}
  .chan-row:first-child{border-top:0}
  .chan-name{font-weight:600;font-size:14.5px;min-width:0}
  .chan-name small{display:block;font-family:var(--fm);font-size:11px;color:var(--muted);font-weight:500;margin-top:1px}
  .chan-bar{height:8px;border-radius:999px;background:var(--surface-2);overflow:hidden}
  .chan-bar i{display:block;height:100%;border-radius:999px;background:var(--accent)}
  .chan-row.done .chan-bar i{background:var(--done)}
  .chan-cnt{font-family:var(--fm);font-size:12.5px;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap;text-align:right}
  .chan-cnt b{color:var(--ink);font-weight:700}
  @media(max-width:560px){.chan-row{grid-template-columns:1fr auto}.chan-bar{grid-column:1/-1;order:3}}
  /* ── services: slim timeline, tap a row for its description ── */
  ol.phases{list-style:none;margin:0;padding:0;display:flex;flex-direction:column}
  ol.phases li{position:relative;padding:0 0 16px 26px;border-left:2px solid var(--border);margin-left:6px}
  ol.phases li:last-child{border-left-color:transparent;padding-bottom:0}
  .dot{position:absolute;left:-8px;top:4px;width:14px;height:14px;border-radius:50%;background:var(--surface);border:2px solid var(--pend)}
  li.done .dot{background:var(--done);border-color:var(--done)}
  li.active .dot{background:var(--active);border-color:var(--active);box-shadow:0 0 0 4px var(--ring)}
  li.scheduled .dot{border-color:var(--sched)}
  .ph-h{display:flex;align-items:baseline;gap:10px;cursor:pointer;
    background:none;border:0;padding:0;width:100%;text-align:left;color:inherit;font:inherit}
  .ph-h:focus-visible{outline:2px solid var(--ring);outline-offset:3px;border-radius:6px}
  .ph-t{font-weight:600;font-size:14.5px;min-width:0}
  .ph-when{font-family:var(--fm);font-size:11.5px;color:var(--muted);margin-left:auto;white-space:nowrap;flex:0 0 auto}
  .chev{color:var(--muted);font-size:10px;transition:transform .18s ease;flex:0 0 auto}
  li.open .chev{transform:rotate(90deg)}
  .ph-d{color:var(--muted);font-size:13.5px;margin-top:5px;display:none;max-width:640px}
  li.open .ph-d{display:block}
  .chips{display:flex;flex-wrap:wrap;gap:5px}
  .chip{font-family:var(--fm);font-size:10px;font-weight:700;letter-spacing:.03em;padding:2px 8px;border-radius:999px;
    border:1px solid var(--border);color:var(--pend)}
  .chip.live{color:var(--done);border-color:color-mix(in srgb,var(--done) 45%,transparent);background:color-mix(in srgb,var(--done) 10%,transparent)}

  .pill{font-family:var(--fm);font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
    padding:2px 9px;border-radius:999px;display:inline-block;line-height:1.6}
  .pill.done{color:var(--done);background:color-mix(in srgb,var(--done) 15%,transparent)}
  .pill.active{color:var(--active);background:color-mix(in srgb,var(--active) 15%,transparent)}
  .pill.scheduled{color:var(--sched);background:color-mix(in srgb,var(--sched) 15%,transparent)}
  .pill.pending{color:var(--pend);background:color-mix(in srgb,var(--pend) 18%,transparent)}

  .units{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-top:4px}
  .unit{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
  .unit .n{font-weight:600;font-size:14px;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .unit .row{display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:12px;color:var(--muted);margin-top:5px}
  .unit .row span:first-child{font-family:var(--fm);font-size:10.5px;letter-spacing:.03em;text-transform:uppercase}
  .unit .row.ch{flex-direction:column;align-items:flex-start;gap:6px}

  .foot{margin-top:40px;border-top:1px solid var(--border);padding-top:16px;color:var(--muted);font-size:13.5px}
  .foot b{color:var(--ink)}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

      "channels": {
        "airbnb": "pending",
        "vrbo": "pending",
        "bookingcom": "pending",
        "expedia": "pending"
      },
      "audit": "pending"
    }
  ]
};
/* DATA-END */

const LABELS = {
  en: {
    title:"Project Status", client:c=>`Prepared for <b>${c}</b> · Airbnb & short-term rental management`,
    updated:d=>`Updated ${d}`, toggle:"ES",
    channels:"Channels", channelsSub:"How many of your units are live on each platform — updates automatically.",
    chanState:{done:"Live", active:"In progress", scheduled:"Coming up"},
    chanCnt:(n,t)=>`<b>${n}</b> / ${t} units`,
    roadmap:"Services roadmap", roadmapSub:"Everything else we're doing — tap a step for details.",
    units:"Your 23 units", unitsSub:"Migration and content review, unit by unit. Details discussed on our biweekly calls.",
    stats:{migrated:"Units migrated", audited:"Content reviewed", channels:"Channels live", phase:"Phases complete"},
    st:{done:"Done", active:"In progress", scheduled:"Scheduled", pending:"Pending"},
    mig:{verified:"Migrated", connected:"Connecting", pending:"Queued"},
    aud:{done:"Reviewed", progress:"In review", pending:"Pending"},
    migL:"Migration", audL:"Content",
    prog:(n,t)=>`${n} of ${t} units live`,
    chLive:"live", chPend:"pending", chanL:"Channels",
    tapHint:"Tap a step for details.",
    foot:`Questions? Reach Roy at <a href="mailto:roy.y@jstlikehome.com">roy.y@jstlikehome.com</a>. This page updates as the work progresses.`
  },
  es: {
    title:"Estado del Proyecto", client:c=>`Preparado para <b>${c}</b> · Gestión de Airbnb y alquileres de corto plazo`,
    updated:d=>`Actualizado ${d}`, toggle:"EN",
    channels:"Canales", channelsSub:"Cuántas de tus unidades están activas en cada plataforma — se actualiza automáticamente.",
    chanState:{done:"Activo", active:"En progreso", scheduled:"Próximamente"},
    chanCnt:(n,t)=>`<b>${n}</b> / ${t} unidades`,
    roadmap:"Hoja de ruta de servicios", roadmapSub:"Todo lo demás que estamos haciendo — toca un paso para ver los detalles.",
    units:"Tus 23 unidades", unitsSub:"Migración y revisión de contenido, unidad por unidad. Los detalles se tratan en nuestras llamadas quincenales.",
    stats:{migrated:"Unidades migradas", audited:"Contenido revisado", channels:"Canales activos", phase:"Fases completadas"},
    st:{done:"Completado", active:"En progreso", scheduled:"Programado", pending:"Pendiente"},
    mig:{verified:"Migrada", connected:"Conectando", pending:"En cola"},
    aud:{done:"Revisado", progress:"En revisión", pending:"Pendiente"},
    migL:"Migración", audL:"Contenido",
    prog:(n,t)=>`${n} de ${t} unidades activas`,
    chLive:"activo", chPend:"pendiente", chanL:"Canales",
    tapHint:"Toca un paso para ver los detalles.",
    foot:`¿Preguntas? Escribe a Roy: <a href="mailto:roy.y@jstlikehome.com">roy.y@jstlikehome.com</a>. Esta página se actualiza a medida que avanza el trabajo.`
  }
};

// per-OTA columns (must match the generator's CHANNEL_KEYS) — names are brands, same in both languages
const CHANNELS = [
  {key:"airbnb", name:"Airbnb"},
  {key:"vrbo", name:"VRBO"},
  {key:"bookingcom", name:"Booking.com"},
  {key:"expedia", name:"Expedia"}
];
const openPhases = new Set(); // which roadmap steps the user has expanded (survives lang toggle)

let lang = "es"; // client-first default; flip to "en" here if you'd rather it open in English

function pct(n,d){ return d ? Math.round(100*n/d) : 0; }

function render(){
  const L = LABELS[lang];
  const P = DATA.phases, U = DATA.listings;
  const migrated = U.filter(u=>u.migration==="verified").length;
  const audited  = U.filter(u=>u.audit==="done").length;
  const channelsLive = P.filter(p=>p.kind==="channel" && p.status==="done").length;
  const phasesDone = P.filter(p=>p.status==="done").length;

  document.documentElement.lang = lang;
  document.getElementById("t-title").textContent = L.title;
  document.getElementById("t-client").innerHTML = L.client(DATA.client);
  document.getElementById("t-updated").textContent = L.updated(DATA.updated);
  document.getElementById("langbtn").textContent = L.toggle;
  document.getElementById("t-roadmap").textContent = L.roadmap;
  document.getElementById("t-roadmap-sub").textContent = L.roadmapSub;
  document.getElementById("t-units").textContent = L.units;
  document.getElementById("t-units-sub").textContent = L.unitsSub;
  document.getElementById("foot").innerHTML = L.foot;

  const stat = (k,total,label)=>`<div class="stat"><div class="k">${k}${total!=null?`<small>/${total}</small>`:""}</div>
    <div class="l">${label}</div><div class="bar"><i style="width:${pct(k,total??k)}%"></i></div></div>`;
  document.getElementById("stats").innerHTML =
    stat(migrated, DATA.listings.length, L.stats.migrated) +
    stat(audited, DATA.listings.length, L.stats.audited) +
    stat(channelsLive, DATA.channelsTotal, L.stats.channels) +
    stat(phasesDone, P.length, L.stats.phase);

  document.getElementById("t-channels").textContent = L.channels;
  document.getElementById("t-channels-sub").textContent = L.channelsSub;

  // ── channels: one calm row per platform — bar + count, nothing to click ──
  document.getElementById("channels").innerHTML = P.filter(p=>p.kind==="channel").map(p=>{
    const t = p[lang] || p.en;
    const done = p.progress ? p.progress.done : 0;
    const total = p.progress ? p.progress.total : U.length;
    const w = p.progress ? pct(done,total) : 0;
    return `<div class="chan-row ${p.status}">
      <div class="chan-name">${t.title}<small>${p.when||""} · ${L.chanState[p.status]||L.st[p.status]}</small></div>
      <div class="chan-bar"><i style="width:${w}%"></i></div>
      <div class="chan-cnt">${p.progress?L.chanCnt(done,total):"—"}</div>
    </div>`;
  }).join("");

  // ── services: slim timeline, collapsed; tap a row for its description ──
  const CORE = P.map((p,i)=>({p,i})).filter(x=>x.p.kind!=="channel");
  document.getElementById("phases").innerHTML = CORE.map(({p,i})=>{
    const t = p[lang] || p.en;
    const open = openPhases.has(i);
    return `<li class="${p.status}${open?" open":""}"><span class="dot"></span>
      <button class="ph-h" type="button" data-ph="${i}" aria-expanded="${open}">
        <span class="ph-t">${t.title}</span>
        <span class="pill ${p.status}">${L.st[p.status]}</span>
        ${p.when?`<span class="ph-when">${p.when}</span>`:""}
        <span class="chev">▶</span></button>
      <div class="ph-d">${t.desc}</div></li>`;
  }).join("");

  document.querySelectorAll(".ph-h").forEach(b=>b.addEventListener("click", ()=>{
    const i = +b.getAttribute("data-ph");
    const li = b.closest("li");
    const nowOpen = !li.classList.contains("open");
    li.classList.toggle("open", nowOpen);
    b.setAttribute("aria-expanded", nowOpen);
    if(nowOpen) openPhases.add(i); else openPhases.delete(i);
  }));

  document.getElementById("units").innerHTML = U.map(u=>`
    <div class="unit"><div class="n">${u.name}</div>
      <div class="row ch"><span>${L.chanL}</span><span class="chips">${CHANNELS.map(c=>{
        const live = (u.channels||{})[c.key]==="live";
        return `<span class="chip ${live?"live":""}" title="${c.name}: ${live?L.chLive:L.chPend}">${live?"✓ ":""}${c.name}</span>`;
      }).join("")}</span></div>
      <div class="row"><span>${L.audL}</span><span class="pill ${u.audit==="done"?"done":u.audit==="progress"?"active":"pending"}">${L.aud[u.audit]}</span></div>
    </div>`).join("");
}

document.getElementById("langbtn").addEventListener("click", ()=>{ lang = lang==="es"?"en":"es"; render(); });
render();
</script>
